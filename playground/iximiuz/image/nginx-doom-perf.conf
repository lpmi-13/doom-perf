server {
  listen 0.0.0.0:8080;
  server_name _;

  root /opt/doom-perf/public;
  index index.html;

  # Low-risk defense-in-depth headers. Keep this CSP away from
  # script-src/style-src so existing inline bootstrap, bundles, and WASM load.
  # nginx does not inherit these into locations that define their own add_header.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'" always;

  location = /healthz {
    proxy_pass http://127.0.0.1:9999/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /telemetry {
    proxy_pass http://127.0.0.1:9999/telemetry;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    add_header X-Accel-Buffering no always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'" always;
  }

  location ~* \.wasm$ {
    default_type application/wasm;
    try_files $uri =404;
  }

  location /dist/ {
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'" always;
    try_files $uri =404;
  }

  location /maps/ {
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; form-action 'self'" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
